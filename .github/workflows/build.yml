name: AION-OS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build AION-OS ISO
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential nasm xorriso mtools dosfstools \
          wget git cmake ninja-build python3 \
          gnu-efi mingw-w64 \
          gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu

    - name: Build llama.cpp
      run: |
        mkdir -p tools
        git clone --depth=1 https://github.com/ggerganov/llama.cpp tools/llama.cpp
        cd tools/llama.cpp
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DGGML_NATIVE=OFF \
          -DGGML_AVX2=ON \
          -DLLAMA_BUILD_TESTS=OFF \
          -DLLAMA_BUILD_EXAMPLES=OFF \
          -DLLAMA_BUILD_SERVER=OFF \
          -GNinja
        ninja -j$(nproc) llama ggml
        echo "=== libs generadas ==="
        find . -name "*.a" | sort

    - name: Download Qwen2.5:3b Q4_K_M weights
      run: |
        mkdir -p iso_root/AION
        wget -q --show-progress \
          "https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf" \
          -O iso_root/AION/consciousness.bin
        ls -lh iso_root/AION/consciousness.bin

    - name: Build UEFI bootloader
      run: |
        git clone --depth=1 https://github.com/rhboot/gnu-efi /tmp/gnu-efi
        cd /tmp/gnu-efi
        make ARCH=x86_64 -j$(nproc)
        sudo make ARCH=x86_64 PREFIX=/tmp/efi-install install

        cd $GITHUB_WORKSPACE/bootloader

        EFI_INC=/tmp/efi-install/include/efi
        EFI_LIB=/tmp/efi-install/lib
        EFI_LDS=${EFI_LIB}/elf_x86_64_efi.lds

        gcc \
          -Wall -Wno-implicit-function-declaration \
          -ffreestanding -fno-stack-protector -fno-stack-check \
          -fshort-wchar -mno-red-zone -fPIC \
          -I${EFI_INC} -I${EFI_INC}/x86_64 -I${EFI_INC}/protocol \
          -DGNU_EFI_USE_MS_ABI \
          -c bootloader.c -o bootloader.o

        ld \
          -nostdlib -znocombreloc \
          -T ${EFI_LDS} \
          -shared -Bsymbolic \
          ${EFI_LIB}/crt0-efi-x86_64.o \
          bootloader.o \
          -o bootloader.so \
          -L${EFI_LIB} -lefi -lgnuefi

        objcopy \
          -j .text -j .sdata -j .data -j .rodata \
          -j .dynamic -j .dynsym -j .rel -j .rela \
          -j .rel.* -j .rela.* -j .reloc \
          --strip-debug --target=efi-app-x86_64 \
          bootloader.so BOOTX64.EFI

        ls -lh BOOTX64.EFI

    - name: Build AION kernel
      run: |
        LLAMA_LIB=$(find tools/llama.cpp/build -name "libllama.a" | head -1)
        LLAMA_INC="tools/llama.cpp/include"
        LLAMA_GGML_INC="tools/llama.cpp/ggml/include"
        echo "LLAMA_LIB=$LLAMA_LIB"

        cd kernel
        make -j$(nproc) \
          CC="x86_64-linux-gnu-gcc" \
          AS="nasm" \
          LD="x86_64-linux-gnu-ld" \
          LLAMA_LIB="../${LLAMA_LIB}" \
          EXTRA_CFLAGS="-I../${LLAMA_INC} -I../${LLAMA_GGML_INC}"

        ls -lh kernel.bin

    - name: Assemble bootable ISO
      run: |
        cp bootloader/BOOTX64.EFI iso_root/AION/ 2>/dev/null || true
        python3 tools/build/make_iso.py
        ls -lh aion-os.iso

    - name: Upload AION-OS ISO
      uses: actions/upload-artifact@v4
      with:
        name: aion-os-iso
        path: aion-os.iso
        retention-days: 30
        compression-level: 0

    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: |
          kernel/kernel.bin
          bootloader/BOOTX64.EFI
        retention-days: 7
